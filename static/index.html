<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UrbanTrace AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #0f172a;
    }

    /* ── Header ────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #0c2340 0%, #1a3c5e 60%, #1e4d78 100%);
      color: #fff;
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 16px rgba(0,0,0,.3);
      position: relative;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-title { font-size: 15px; font-weight: 700; letter-spacing: .01em; }
    .header-sub {
      font-size: 11px;
      opacity: .6;
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(74,222,128,.35);
    }

    #reset-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background .15s, transform .1s;
      display: flex; align-items: center; gap: 6px;
    }
    #reset-btn:hover  { background: rgba(255,255,255,.2); transform: translateY(-1px); }
    #reset-btn:active { transform: translateY(0); }

    /* ── Chat area ─────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar       { width: 5px; }
    #chat::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── Message rows ──────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: slideUp .22s cubic-bezier(.25,.8,.25,1) both;
    }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatars ───────────────────────────────────── */
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      letter-spacing: .02em;
    }
    .avatar.assistant {
      background: linear-gradient(135deg, #1a3c5e, #2563eb);
      color: #fff;
      box-shadow: 0 2px 8px rgba(26,60,94,.35);
    }
    .avatar.user {
      background: linear-gradient(135deg, #475569, #64748b);
      color: #fff;
    }

    /* ── Message content ───────────────────────────── */
    .msg-content { display: flex; flex-direction: column; gap: 4px; max-width: 72%; }
    .msg-row.user .msg-content { align-items: flex-end; }

    .msg-meta {
      font-size: 11px;
      color: #94a3b8;
      padding: 0 6px;
      font-weight: 500;
    }

    /* ── Bubbles ───────────────────────────────────── */
    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      overflow-x: auto;
    }
    .bubble.assistant {
      background: #fff;
      color: #1e293b;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 10px rgba(0,0,0,.07), 0 4px 24px rgba(0,0,0,.04);
    }
    .bubble.user {
      background: linear-gradient(135deg, #1a3c5e 0%, #2563eb 100%);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(37,99,235,.3);
    }
    .bubble.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-bottom-left-radius: 4px;
    }

    /* markdown inside assistant bubbles */
    .bubble.assistant p           { margin-bottom: .55em; }
    .bubble.assistant p:last-child{ margin-bottom: 0; }
    .bubble.assistant ul,
    .bubble.assistant ol          { padding-left: 1.4em; margin-bottom: .5em; }
    .bubble.assistant li          { margin-bottom: .25em; }
    .bubble.assistant h1,.bubble.assistant h2,
    .bubble.assistant h3          { font-size: .95em; font-weight: 700; margin: .6em 0 .3em; }
    .bubble.assistant strong      { font-weight: 600; }
    .bubble.assistant em          { font-style: italic; color: #4f6c8a; }
    .bubble.assistant table       { border-collapse: collapse; font-size: 13px; margin: .6em 0; width: 100%; }
    .bubble.assistant th,
    .bubble.assistant td          { border: 1px solid #e2e8f0; padding: 6px 11px; text-align: left; }
    .bubble.assistant th          { background: #f8fafc; font-weight: 600; }
    .bubble.assistant tr:hover td { background: #f8fafc; }
    .bubble.assistant code        { background: #f1f5f9; padding: 2px 6px; border-radius: 5px; font-size: .86em; }
    .bubble.assistant pre         { background: #f1f5f9; padding: 12px; border-radius: 8px; overflow-x: auto; margin: .6em 0; }
    .bubble.assistant pre code    { background: none; padding: 0; }

    /* ── Thinking indicator ────────────────────────── */
    .thinking-dots {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: dotBounce 1.3s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(.65); opacity: .4; }
      40%           { transform: scale(1);   opacity: 1;  }
    }

    /* ── Input area ────────────────────────────────── */
    #input-area {
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 16px 24px;
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 0;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      padding: 8px 8px 8px 16px;
      transition: border-color .15s, box-shadow .15s;
    }
    .input-wrap:focus-within {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: #fff;
    }
    #msg-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 4px 8px 4px 0;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      max-height: 130px;
      overflow-y: auto;
      color: #0f172a;
    }
    #msg-input::placeholder { color: #94a3b8; }
    #send-btn {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #1a3c5e, #2563eb);
      border: none;
      border-radius: 11px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(37,99,235,.3);
    }
    #send-btn:hover   { opacity: .9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.4); }
    #send-btn:active  { transform: translateY(0); }
    #send-btn:disabled{ opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
    #send-btn svg     { width: 16px; height: 16px; fill: #fff; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">🏙️</div>
    <div>
      <div class="header-title">UrbanTrace AI</div>
      <div class="header-sub">
        <span class="status-dot"></span>
        Cluj-Napoca Property Research
      </div>
    </div>
  </div>
  <button id="reset-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
    New Chat
  </button>
</header>

<div id="chat"></div>

<div id="input-area">
  <div class="input-wrap">
    <textarea id="msg-input" rows="1"
      placeholder="Ask about Cluj-Napoca properties, sales, ownership, market stats…"></textarea>
    <button id="send-btn" title="Send (Enter)">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');

  marked.setOptions({ breaks: true, gfm: true });

  function scrollBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function createRow(role) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    return row;
  }

  function createAvatar(role) {
    const av = document.createElement('div');
    av.className = `avatar ${role}`;
    av.textContent = role === 'assistant' ? 'UT' : 'You';
    return av;
  }

  function addMessage(role, text, isMarkdown = false) {
    const row     = createRow(role);
    const av      = createAvatar(role);
    const content = document.createElement('div');
    content.className = 'msg-content';

    const meta   = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = role === 'user' ? 'You' : 'Assistant';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;

    if (isMarkdown) {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }

    content.appendChild(meta);
    content.appendChild(bubble);
    row.appendChild(av);
    row.appendChild(content);
    chat.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function addThinking() {
    const row     = createRow('assistant');
    const av      = createAvatar('assistant');
    const content = document.createElement('div');
    content.className = 'msg-content';

    const bubble = document.createElement('div');
    bubble.className = 'bubble assistant';
    const dots = document.createElement('div');
    dots.className = 'thinking-dots';
    dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    bubble.appendChild(dots);

    content.appendChild(bubble);
    row.appendChild(av);
    row.appendChild(content);
    chat.appendChild(row);
    scrollBottom();
    return row;
  }

  function addError(text) {
    const row     = createRow('assistant');
    const av      = createAvatar('assistant');
    const content = document.createElement('div');
    content.className = 'msg-content';

    const bubble = document.createElement('div');
    bubble.className = 'bubble error';
    bubble.textContent = text;

    content.appendChild(bubble);
    row.appendChild(av);
    row.appendChild(content);
    chat.appendChild(row);
    scrollBottom();
  }

  async function send() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    const thinking = addThinking();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      thinking.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addError(err.detail || `Server error (${res.status}). Please try again.`);
      } else {
        const data = await res.json();
        addMessage('assistant', data.response, true);
      }
    } catch {
      thinking.remove();
      addError('Could not reach the server. Is it running?');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', send);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 130) + 'px';
  });

  document.getElementById('reset-btn').addEventListener('click', async () => {
    await fetch('/reset', { method: 'POST' }).catch(() => {});
    chat.innerHTML = '';
    addMessage('assistant',
      'Session reset. How can I help you with Cluj-Napoca property research?', true);
  });

  // Welcome message
  addMessage('assistant',
    'Hello! I can help you research Cluj-Napoca properties.\n\n' +
    'Try asking:\n' +
    '- *"Show me SRL-owned properties sold in Gheorgheni in 2023"*\n' +
    '- *"What is the median price per sqft in Mărăști?"*\n' +
    '- *"Who owns Strada Horea 61?"*',
    true
  );

  input.focus();
</script>
</body>
</html>
